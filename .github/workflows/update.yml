name: Auto Update RSS

on:
  workflow_dispatch:
  schedule:
    # 对应北京时间凌晨 01:15 (UTC 时间前一天的 17:15)
    # 为什么不设置在 00:05？因为 GitHub Actions 的定时任务有排队延迟，避开整点运行会更稳定。
    - cron: '15 17 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 注意这里变了，安装 playwright 及其浏览器内核
      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Script
        run: python main.py

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新每日晨读 RSS"
          file_pattern: 'atom.xml history.json'
