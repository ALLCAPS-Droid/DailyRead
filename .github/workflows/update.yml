name: Auto Update RSS

on:
  workflow_dispatch:    # 保留这个，允许你在网页上手动点击运行
  schedule:
    # 对应北京时间 06:30 (UTC 时间 昨天 22:30)
    - cron: '30 22 * * *'
    
    # 对应北京时间 09:30 (UTC 时间 01:30)
    - cron: '30 1 * * *'
    
    # 对应北京时间 12:30 (UTC 时间 04:30)
    - cron: '30 4 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 注意这里变了，安装 playwright 及其浏览器内核
      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Script
        run: python main.py

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新每日晨读 RSS"
          file_pattern: 'atom.xml history.json'
